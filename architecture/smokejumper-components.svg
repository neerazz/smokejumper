<svg xmlns="http://www.w3.org/2000/svg" width="1660" height="1110" viewBox="0 0 1660 1110" font-family="-apple-system, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="1660" height="1110" fill="#ffffff"/>

  <!-- ═══ Title ═══ -->
  <text x="60" y="78" font-size="30" font-weight="700" fill="#10334a">Smokejumper — agentic SRE incident responder</text>
  <text x="60" y="106" font-size="15" fill="#5b6b7a">Layered component view · v1 design · an alert lands, Smokejumper parachutes in, investigates in parallel, reports back with receipts</text>

  <!-- ═══ Band 1 · Channels ═══ -->
  <rect x="60" y="130" width="1540" height="104" rx="10" fill="#e9f3f7" stroke="#7fb0bd"/>
  <text x="84" y="176" font-size="17" font-weight="700" fill="#0b7285">CHANNELS</text>
  <g font-size="13.5" font-weight="700" fill="#3d4852" text-anchor="middle">
    <rect x="230" y="154" width="200" height="56" rx="8" fill="#ffffff" stroke="#5b6b7a" stroke-dasharray="5 4"/>
    <text x="330" y="178">Grafana</text>
    <rect x="448" y="154" width="200" height="56" rx="8" fill="#ffffff" stroke="#5b6b7a" stroke-dasharray="5 4"/>
    <text x="548" y="178">Datadog</text>
    <rect x="666" y="154" width="200" height="56" rx="8" fill="#ffffff" stroke="#5b6b7a" stroke-dasharray="5 4"/>
    <text x="766" y="178">PagerDuty</text>
    <rect x="884" y="154" width="200" height="56" rx="8" fill="#ffffff" stroke="#5b6b7a" stroke-dasharray="5 4"/>
    <text x="984" y="178">Splunk / generic</text>
    <rect x="1102" y="154" width="200" height="56" rx="8" fill="#ffffff" stroke="#5b6b7a" stroke-dasharray="5 4"/>
    <text x="1202" y="178">Slack</text>
    <rect x="1320" y="154" width="200" height="56" rx="8" fill="#ffffff" stroke="#5b6b7a" stroke-dasharray="5 4"/>
    <text x="1420" y="178">Linear</text>
  </g>
  <g font-size="11.5" fill="#5b6b7a" text-anchor="middle">
    <text x="330" y="196">alert webhook · in</text>
    <text x="548" y="196">alert webhook · in</text>
    <text x="766" y="196">events v2 · in</text>
    <text x="984" y="196">JSON webhook · in</text>
    <text x="1202" y="196">@mention · buttons · in/out</text>
    <text x="1420" y="196">tickets · out</text>
  </g>

  <!-- ═══ Band 2 · Cross-cutting ═══ -->
  <rect x="60" y="250" width="1540" height="104" rx="10" fill="#e9f3f7" stroke="#7fb0bd"/>
  <text x="84" y="288" font-size="17" font-weight="700" fill="#0b7285">CROSS-</text>
  <text x="84" y="310" font-size="17" font-weight="700" fill="#0b7285">CUTTING</text>
  <rect x="230" y="266" width="420" height="72" rx="8" fill="#f1f3f5" stroke="#5b6b7a" stroke-dasharray="5 4"/>
  <text x="248" y="292" font-size="14.5" font-weight="700" fill="#3d4852">Auth · Governance · Tenancy — ports</text>
  <text x="248" y="312" font-size="12" fill="#5b6b7a">Black boxes behind interfaces · v1 stubs: AllowAll ·</text>
  <text x="248" y="328" font-size="12" fill="#5b6b7a">SingleTenant · EnvCredentials — swap in real ones later</text>
  <rect x="668" y="266" width="420" height="72" rx="8" fill="#e3f3f6" stroke="#0b7285"/>
  <text x="686" y="292" font-size="14.5" font-weight="700" fill="#0b3a42">Governor + Scheduler</text>
  <text x="686" y="312" font-size="12" fill="#0b3a42">Iteration &amp; token budgets · circuit breakers · storm</text>
  <text x="686" y="328" font-size="12" fill="#0b3a42">brake · registry sync · scheduled investigations</text>
  <rect x="1106" y="266" width="420" height="72" rx="8" fill="#efeafb" stroke="#6741b8"/>
  <text x="1124" y="292" font-size="14.5" font-weight="700" fill="#2f1e5c">Flight Recorder — append-only audit spine</text>
  <text x="1124" y="312" font-size="12" fill="#2f1e5c">Every event, node transition, LLM + tool call, gate,</text>
  <text x="1124" y="328" font-size="12" fill="#2f1e5c">action (Postgres) · powers replay/eval + hit-rate stats</text>

  <!-- ═══ Columns ═══ -->
  <!-- Column 1 · INGESTION -->
  <g>
    <rect x="60" y="380" width="370" height="524" rx="12" fill="#fafbfc" stroke="#d5dde5"/>
    <rect x="76" y="396" width="338" height="44" rx="8" fill="#e3f3f6" stroke="#0b7285"/>
    <text x="245" y="424" font-size="17" font-weight="700" fill="#0b7285" text-anchor="middle">INGESTION</text>

    <rect x="76" y="456" width="338" height="128" rx="8" fill="#ffffff" stroke="#8a99a8"/>
    <text x="90" y="480" font-size="15" font-weight="700" fill="#1f2d3a">Receiver — no LLM, no writes</text>
    <text x="90" y="502" font-size="12.5" fill="#3d4852">Normalizes every source into one</text>
    <text x="90" y="519" font-size="12.5" fill="#3d4852">AgentEvent schema; fingerprints,</text>
    <text x="90" y="536" font-size="12.5" fill="#3d4852">dedupes, and coalesces alert storms</text>
    <text x="90" y="553" font-size="12.5" fill="#3d4852">before anything thinks. (B1 → B2)</text>

    <rect x="76" y="598" width="338" height="128" rx="8" fill="#ffffff" stroke="#8a99a8"/>
    <text x="90" y="622" font-size="15" font-weight="700" fill="#1f2d3a">Event inbox — Redis Streams</text>
    <text x="90" y="644" font-size="12.5" fill="#3d4852">Durable buffer between bursty</text>
    <text x="90" y="661" font-size="12.5" fill="#3d4852">sources and the agent graph;</text>
    <text x="90" y="678" font-size="12.5" fill="#3d4852">absorbs storms so investigations</text>
    <text x="90" y="695" font-size="12.5" fill="#3d4852">start at a controlled rate.</text>

    <rect x="76" y="740" width="338" height="128" rx="8" fill="#ffffff" stroke="#8a99a8"/>
    <text x="90" y="764" font-size="15" font-weight="700" fill="#1f2d3a">AgentEvent — contract B2</text>
    <text x="90" y="786" font-size="12.5" fill="#3d4852">One normalized envelope: source,</text>
    <text x="90" y="803" font-size="12.5" fill="#3d4852">severity, fingerprint, entities, raw</text>
    <text x="90" y="820" font-size="12.5" fill="#3d4852">payload — the single input type</text>
    <text x="90" y="837" font-size="12.5" fill="#3d4852">the intelligence layer accepts.</text>
  </g>

  <!-- Column 2 · INTELLIGENCE -->
  <g>
    <rect x="450" y="380" width="370" height="524" rx="12" fill="#fafbfc" stroke="#d5dde5"/>
    <rect x="466" y="396" width="338" height="44" rx="8" fill="#e3f3f6" stroke="#0b7285"/>
    <text x="635" y="424" font-size="17" font-weight="700" fill="#0b7285" text-anchor="middle">INTELLIGENCE · LangGraph</text>

    <rect x="466" y="456" width="338" height="128" rx="8" fill="#ffffff" stroke="#8a99a8"/>
    <text x="480" y="480" font-size="15" font-weight="700" fill="#1f2d3a">Orchestrator (supervisor)</text>
    <text x="480" y="502" font-size="12.5" fill="#3d4852">intake → retrieve → dispatch →</text>
    <text x="480" y="519" font-size="12.5" fill="#3d4852">aggregate Findings → synthesize</text>
    <text x="480" y="536" font-size="12.5" fill="#3d4852">Conclusion. The only place plans</text>
    <text x="480" y="553" font-size="12.5" fill="#3d4852">are made. (B6 determinism boundary)</text>

    <rect x="466" y="598" width="338" height="128" rx="8" fill="#ffffff" stroke="#8a99a8"/>
    <text x="480" y="622" font-size="15" font-weight="700" fill="#1f2d3a">Agent Registry</text>
    <text x="480" y="644" font-size="12.5" fill="#3d4852">Declarative and versioned: each</text>
    <text x="480" y="661" font-size="12.5" fill="#3d4852">specialist is prompt + tool allowlist</text>
    <text x="480" y="678" font-size="12.5" fill="#3d4852">+ budget + dispatch triggers.</text>
    <text x="480" y="695" font-size="12.5" fill="#3d4852">Adding an agent is config, not code.</text>

    <rect x="466" y="740" width="338" height="145" rx="8" fill="#ffffff" stroke="#8a99a8"/>
    <text x="480" y="764" font-size="15" font-weight="700" fill="#1f2d3a">Specialist sub-agents (B11)</text>
    <text x="480" y="786" font-size="12.5" fill="#3d4852">Parallel · stateless · budgeted:</text>
    <text x="480" y="803" font-size="12.5" fill="#3d4852">DB Investigator · Metrics Analyst ·</text>
    <text x="480" y="820" font-size="12.5" fill="#3d4852">Log Analyst · Code Investigator ·</text>
    <text x="480" y="837" font-size="12.5" fill="#3d4852">Change Auditor · Precedent</text>
    <text x="480" y="854" font-size="12.5" fill="#3d4852">Researcher. Each returns a Finding.</text>
  </g>

  <!-- Column 3 · KNOWLEDGE -->
  <g>
    <rect x="840" y="380" width="370" height="524" rx="12" fill="#fafbfc" stroke="#d5dde5"/>
    <rect x="856" y="396" width="338" height="44" rx="8" fill="#efeafb" stroke="#6741b8"/>
    <text x="1025" y="424" font-size="17" font-weight="700" fill="#6741b8" text-anchor="middle">KNOWLEDGE · GraphRAG</text>

    <rect x="856" y="456" width="338" height="128" rx="8" fill="#f7f4fd" stroke="#6741b8"/>
    <text x="910" y="480" font-size="15" font-weight="700" fill="#2f1e5c">Knowledge façade (B3)</text>
    <text x="910" y="502" font-size="12.5" fill="#2f1e5c">retrieve(ctx) → KnowledgeBundle.</text>
    <text x="910" y="519" font-size="12.5" fill="#2f1e5c">Vectors find the entry points,</text>
    <text x="910" y="536" font-size="12.5" fill="#2f1e5c">the graph expands them — one call,</text>
    <text x="910" y="553" font-size="12.5" fill="#2f1e5c">four modalities behind it.</text>

    <rect x="856" y="598" width="338" height="145" rx="8" fill="#f7f4fd" stroke="#6741b8"/>
    <text x="910" y="622" font-size="15" font-weight="700" fill="#2f1e5c">Four modalities</text>
    <text x="910" y="644" font-size="12.5" fill="#2f1e5c">① Vector store (pgvector) — episodic</text>
    <text x="910" y="661" font-size="12.5" fill="#2f1e5c">② Knowledge graph — caused_by ·</text>
    <text x="910" y="678" font-size="12.5" fill="#2f1e5c">fixed_by · applies_to edges</text>
    <text x="910" y="695" font-size="12.5" fill="#2f1e5c">③ Recipe registry (YAML runbooks)</text>
    <text x="910" y="712" font-size="12.5" fill="#2f1e5c">④ Federated sources over MCP</text>

    <rect x="856" y="757" width="338" height="128" rx="8" fill="#f7f4fd" stroke="#6741b8"/>
    <text x="910" y="781" font-size="15" font-weight="700" fill="#2f1e5c">Distiller — human-gated learning</text>
    <text x="910" y="803" font-size="12.5" fill="#2f1e5c">One-way loop from the Flight</text>
    <text x="910" y="820" font-size="12.5" fill="#2f1e5c">Recorder: case embeddings, graph</text>
    <text x="910" y="837" font-size="12.5" fill="#2f1e5c">edges, draft recipes — recipes ship</text>
    <text x="910" y="854" font-size="12.5" fill="#2f1e5c">only after a human approves. (B9)</text>
  </g>

  <!-- Column 4 · EXECUTION -->
  <g>
    <rect x="1230" y="380" width="370" height="524" rx="12" fill="#fafbfc" stroke="#d5dde5"/>
    <rect x="1246" y="396" width="338" height="44" rx="8" fill="#e3f3f6" stroke="#0b7285"/>
    <text x="1415" y="424" font-size="17" font-weight="700" fill="#0b7285" text-anchor="middle">EXECUTION</text>

    <rect x="1246" y="456" width="338" height="128" rx="8" fill="#fbf0da" stroke="#9a6700"/>
    <text x="1260" y="480" font-size="15" font-weight="700" fill="#5c3d00">MCP tool hub — tiered (B4/B5)</text>
    <text x="1260" y="502" font-size="12.5" fill="#5c3d00">Read tier: agents call freely.</text>
    <text x="1260" y="519" font-size="12.5" fill="#5c3d00">Privileged tier: run suspends →</text>
    <text x="1260" y="536" font-size="12.5" fill="#5c3d00">Slack approve/deny → single-use</text>
    <text x="1260" y="553" font-size="12.5" fill="#5c3d00">token minted by the Auth port.</text>

    <rect x="1246" y="598" width="338" height="128" rx="8" fill="#ffffff" stroke="#8a99a8"/>
    <text x="1260" y="622" font-size="15" font-weight="700" fill="#1f2d3a">Actions — deterministic, no LLM</text>
    <text x="1260" y="644" font-size="12.5" fill="#3d4852">Fingerprint rules decide create-vs-</text>
    <text x="1260" y="661" font-size="12.5" fill="#3d4852">update; idempotent Linear tickets,</text>
    <text x="1260" y="678" font-size="12.5" fill="#3d4852">Slack receipts, findings write-back.</text>
    <text x="1260" y="695" font-size="12.5" fill="#3d4852">No model output touches the world raw.</text>

    <rect x="1246" y="740" width="338" height="128" rx="8" fill="#f1f3f5" stroke="#5b6b7a" stroke-dasharray="5 4"/>
    <text x="1260" y="764" font-size="15" font-weight="700" fill="#3d4852">Platform port (B10) — external</text>
    <text x="1260" y="786" font-size="12.5" fill="#5b6b7a">Versioned API contract to a host</text>
    <text x="1260" y="803" font-size="12.5" fill="#5b6b7a">platform (e.g. Curlix): skills</text>
    <text x="1260" y="820" font-size="12.5" fill="#5b6b7a">execution, asset graph, findings</text>
    <text x="1260" y="837" font-size="12.5" fill="#5b6b7a">write-back. Swappable, stubbable.</text>
  </g>

  <!-- ═══ Runtime foundation ═══ -->
  <rect x="60" y="930" width="1540" height="88" rx="10" fill="#e9f3f7" stroke="#7fb0bd"/>
  <text x="830" y="966" font-size="17" font-weight="700" fill="#0b7285" text-anchor="middle">RUNTIME FOUNDATION</text>
  <text x="830" y="992" font-size="13.5" fill="#3d4852" text-anchor="middle">FastAPI · LangGraph · Redis Streams · Postgres + pgvector · model-agnostic LLM provider</text>

  <!-- ═══ Legend ═══ -->
  <text x="60" y="1052" font-size="12.5" fill="#5b6b7a">Dashed = black-box port or external (v1 ships stubs) · Amber = human-approval-gated · Violet = knowledge &amp; learning loop · Teal = core, deterministic edges</text>
  <text x="60" y="1074" font-size="12.5" fill="#5b6b7a">Learning path: Flight Recorder → Distiller → Knowledge (recipes human-gated) · Versioned boundary contracts B1–B11 — event flow detail in smokejumper-architecture.mmd</text>
</svg>
